name: Build

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Maintained reusable workflow: builds the addon for each requested backend
  # across every OS/arch it supports, packages each artifact into a zip, and
  # publishes them to a single rolling "continuous" GitHub prerelease on every
  # push to main/master. Handles all the per-OS toolchain/SDK plumbing.
  build:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      vst3: true
