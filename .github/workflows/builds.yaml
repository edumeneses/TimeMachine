name: Build

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Maintained reusable workflow: builds the addon's requested back-ends across
  # every supported OS/arch and publishes them to a rolling "continuous"
  # prerelease on each push to main/master. We ship VST3 only.
  standalone:
    uses: ossia/actions/.github/workflows/avnd-addon.yml@master
    secrets: inherit
    with:
      vst3: true
